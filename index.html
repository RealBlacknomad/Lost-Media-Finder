<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lost Media Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding: 50px;
    }
    input[type="text"] {
      width: 60%;
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-left: 10px;
      cursor: pointer;
    }
    #results {
      margin-top: 30px;
      text-align: left;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    .result {
      background: #222;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
    }
    .result a {
      color: #4da3ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>Lost Media Finder</h1>
  <p>Buscador especializado en películas y videos flash antiguos</p>
  
  <form id="searchForm">
    <input type="text" id="query" placeholder="Escribe tu búsqueda...">
    <button type="submit">Buscar</button>
  </form>
  
  <div id="results"></div>
  
  <script>
    const form = document.getElementById('searchForm');
    const resultsDiv = document.getElementById('results');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resultsDiv.innerHTML = "<p>Buscando...</p>";
      const query = document.getElementById('query').value;

      try {
        // Aquí se conecta al backend en Render (ejemplo: https://tu-backend.onrender.com/search)
        const response = await fetch(`https://tu-backend.onrender.com/search?q=${encodeURIComponent(query)}`);
        const data = await response.json();

        resultsDiv.innerHTML = "";
        data.results.forEach(r => {
          const div = document.createElement('div');
          div.className = "result";
          div.innerHTML = `<a href="${r.url}" target="_blank">${r.title}</a><p>${r.snippet}</p>`;
          resultsDiv.appendChild(div);
        });
      } catch (err) {
        resultsDiv.innerHTML = "<p>Error al buscar. Intenta de nuevo.</p>";
      }
    });
  </script>
</body>
</html>
