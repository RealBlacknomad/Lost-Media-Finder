<body>
    <div class="container">

        <h1>🔎 Lost Media Finder</h1>

        <form id="searchForm" class="search-box">

            <div class="search-bar">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search lost media..."
                    autocomplete="off"
                >
                <button type="submit">Buscar</button>
            </div>

            <div class="search-actions">
                <button type="button" data-type="movies">Películas</button>
                <button type="button" data-type="series">Series</button>
            </div>

        </form>

        <div class="filters">
            <label><input type="checkbox" id="deepMode"> Modo profundo</label>
            <label><input type="checkbox" id="blogsOnly"> Blogs</label>
            <label><input type="checkbox" id="forums"> Foros</label>
            <label><input type="checkbox" id="archives"> Archivos</label>
            <label><input type="checkbox" id="oldWeb"> Webs antiguas</label>
            <label><input type="checkbox" id="downloads"> Descargas</label>
            <label><input type="checkbox" id="excludeStreaming" checked> Excluir plataformas</label>
        </div>

        <div id="results"></div>

    </div>
</body>
